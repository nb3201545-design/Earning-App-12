<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinEarn Pro | Premium Earning Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --primary: #ffcc00;
            --primary-dark: #bfa100;
            --bg: #0a0a0b;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #ffffff;
            --text-dim: #a0a0a0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg); color: var(--text); min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; padding: 20px; }
        
        /* Auth Styles */
        .auth-screen { display: flex; flex-direction: column; gap: 15px; margin-top: 50px; }
        input { width: 100%; padding: 15px; background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 12px; color: white; margin-bottom: 10px; }
        
        .wallet-card { background: linear-gradient(135deg, rgba(255, 204, 0, 0.15), rgba(0, 0, 0, 0.4)); border-radius: 24px; padding: 25px; text-align: center; margin-bottom: 20px; border: 1px solid var(--glass-border); }
        .coin-balance { font-size: 42px; font-weight: 800; color: var(--primary); }
        
        .btn-main { width: 100%; background: var(--primary); color: #000; border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-secondary { background: transparent; border: 1px solid var(--primary); color: var(--primary); width: 100%; padding: 10px; border-radius: 10px; margin-top: 10px; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 20px; text-align: center; }
        
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #1a1a1c; padding: 30px; border-radius: 25px; width: 90%; max-width: 400px; }
        
        #admin-panel { display: none; background: #111; padding: 20px; border-top: 2px solid var(--primary); margin-top: 30px; border-radius: 20px; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--primary); color: #000; padding: 10px 20px; border-radius: 50px; display: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-container" class="auth-screen">
            <h1 style="text-align: center; color: var(--primary);">CoinEarn Pro</h1>
            <div id="login-form">
                <h3>Login</h3>
                <input type="email" id="login-email" placeholder="Email">
                <input type="password" id="login-pass" placeholder="Password">
                <button class="btn-main" onclick="handleLogin()">Login</button>
                <p onclick="toggleAuth()" style="text-align: center; margin-top: 15px; cursor: pointer; color: var(--text-dim);">New user? Signup</p>
            </div>
            <div id="signup-form" style="display: none;">
                <h3>Sign Up</h3>
                <input type="text" id="signup-name" placeholder="Full Name">
                <input type="email" id="signup-email" placeholder="Email">
                <input type="password" id="signup-pass" placeholder="Password">
                <button class="btn-main" onclick="handleSignup()">Create Account</button>
                <p onclick="toggleAuth()" style="text-align: center; margin-top: 15px; cursor: pointer; color: var(--text-dim);">Already have an account? Login</p>
            </div>
        </div>

        <div id="main-app" style="display: none;">
            <header style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                <div>
                    <h4 id="user-name-display">Welcome</h4>
                    <p style="font-size: 12px; color: var(--text-dim);">Status: Active</p>
                </div>
                <button onclick="handleLogout()" style="background: none; border: none; color: red;">Logout</button>
            </header>

            <div class="wallet-card">
                <p>TOTAL BALANCE</p>
                <div class="coin-balance" id="coin-display">0</div>
                <div id="rupee-display">₹0.00</div>
                <button class="btn-main" onclick="openWithdraw()" style="width: auto; padding: 10px 30px;">Withdraw</button>
            </div>

            <div class="action-grid">
                <div class="card" onclick="dailyBonus()"><i class="fas fa-gift"></i><p>Daily</p></div>
                <div class="card" onclick="watchAd()"><i class="fas fa-video"></i><p>Ads</p></div>
            </div>

            <div id="admin-panel">
                <h3 style="color: var(--primary);">Admin Controls</h3>
                <input type="email" id="target-email" placeholder="User Email">
                <input type="number" id="add-coins-amount" placeholder="Coins (+/-)">
                <button class="btn-main" onclick="adminAddCoins()">Give Coins</button>
                <button class="btn-secondary" style="border-color: red; color: red;" onclick="adminBanUser()">Ban User</button>
            </div>
        </div>
    </div>

    <div id="generic-modal" class="modal">
        <div class="modal-content" id="modal-body"></div>
    </div>
    <div id="toast"></div>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCMnRHLDNE5tFetiA2xL2Da9LyGNCzXE5A",
            authDomain: "earningapp-9fe93.firebaseapp.com",
            databaseURL: "https://earningapp-9fe93-default-rtdb.firebaseio.com",
            projectId: "earningapp-9fe93",
            storageBucket: "earningapp-9fe93.firebasestorage.app",
            messagingSenderId: "26135116225",
            appId: "1:26135116225:web:9f361a081fcd64ff145740"
        };
        
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        let currentUser = null;
        const MIN_WITHDRAW_COINS = 1000; // ₹10

        // Auth Logic
        function toggleAuth() {
            const login = document.getElementById('login-form');
            const signup = document.getElementById('signup-form');
            login.style.display = login.style.display === 'none' ? 'block' : 'none';
            signup.style.display = signup.style.display === 'none' ? 'block' : 'none';
        }

        async function handleSignup() {
            const name = document.getElementById('signup-name').value;
            const email = document.getElementById('signup-email').value;
            const pass = document.getElementById('signup-pass').value;

            try {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await db.ref('users/' + res.user.uid).set({
                    name: name,
                    email: email,
                    coins: 0,
                    isBanned: false,
                    isAdmin: false
                });
                showToast("Account Created!");
            } catch (err) { alert(err.message); }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (err) { alert(err.message); }
        }

        function handleLogout() { auth.signOut(); location.reload(); }

        // Data Sync
        auth.onAuthStateChanged(user => {
            if (user) {
                db.ref('users/' + user.uid).on('value', snapshot => {
                    const data = snapshot.val();
                    if (data.isBanned) {
                        alert("You are BANNED!");
                        auth.signOut();
                        return;
                    }
                    currentUser = data;
                    currentUser.uid = user.uid;
                    updateUI();
                    document.getElementById('auth-container').style.display = 'none';
                    document.getElementById('main-app').style.display = 'block';
                    document.getElementById('user-name-display').innerText = "Hi, " + data.name;
                    
                    // Show Admin Panel if admin
                    if(data.isAdmin) document.getElementById('admin-panel').style.display = 'block';
                });
            } else {
                document.getElementById('auth-container').style.display = 'block';
                document.getElementById('main-app').style.display = 'none';
            }
        });

        function updateUI() {
            document.getElementById('coin-display').innerText = currentUser.coins;
            document.getElementById('rupee-display').innerText = "₹" + (currentUser.coins / 100).toFixed(2);
        }

        // Earning Functions
        function dailyBonus() {
            const lastDaily = localStorage.getItem('last_daily_' + currentUser.uid);
            if (lastDaily === new Date().toDateString()) return showToast("Already claimed!");
            
            db.ref('users/' + currentUser.uid + '/coins').set(currentUser.coins + 50);
            localStorage.setItem('last_daily_' + currentUser.uid, new Date().toDateString());
            showToast("+50 Coins!");
        }

        function watchAd() {
            showToast("Watching Ad...");
            setTimeout(() => {
                db.ref('users/' + currentUser.uid + '/coins').set(currentUser.coins + 10);
                showToast("+10 Coins!");
            }, 3000);
        }

        // Withdrawal
        function openWithdraw() {
            const modal = document.getElementById('generic-modal');
            const body = document.getElementById('modal-body');
            modal.style.display = 'flex';
            
            if (currentUser.coins < MIN_WITHDRAW_COINS) {
                body.innerHTML = `<h3>Min Withdrawal ₹10</h3><p>Need 1,000 coins.</p><button onclick="closeModal()" class="btn-main">OK</button>`;
            } else {
                body.innerHTML = `<h3>Withdraw ₹${(currentUser.coins/100).toFixed(0)}</h3>
                <input type="text" id="upi-id" placeholder="Enter UPI ID">
                <button onclick="processWithdrawal()" class="btn-main">Request Payment</button>`;
            }
        }

        function processWithdrawal() {
            const upi = document.getElementById('upi-id').value;
            if(!upi) return alert("Enter UPI ID");
            
            db.ref('withdrawals').push({
                uid: currentUser.uid,
                email: currentUser.email,
                amount: currentUser.coins,
                upi: upi,
                status: 'pending'
            });
            db.ref('users/' + currentUser.uid + '/coins').set(0);
            closeModal();
            showToast("Request Sent!");
        }

        // Admin Functions
        async function adminAddCoins() {
            const email = document.getElementById('target-email').value;
            const amount = parseInt(document.getElementById('add-coins-amount').value);
            
            const snapshot = await db.ref('users').orderByChild('email').equalTo(email).once('value');
            if(snapshot.exists()) {
                const userId = Object.keys(snapshot.val())[0];
                const currentCoins = snapshot.val()[userId].coins;
                db.ref('users/' + userId + '/coins').set(currentCoins + amount);
                showToast("Updated!");
            } else { alert("User not found!"); }
        }

        async function adminBanUser() {
            const email = document.getElementById('target-email').value;
            const snapshot = await db.ref('users').orderByChild('email').equalTo(email).once('value');
            if(snapshot.exists()) {
                const userId = Object.keys(snapshot.val())[0];
                db.ref('users/' + userId + '/isBanned').set(true);
                showToast("User Banned!");
            }
        }

        function showToast(m) {
            const t = document.getElementById('toast');
            t.innerText = m; t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }
        function closeModal() { document.getElementById('generic-modal').style.display = 'none'; }
    </script>
</body>
</html>
